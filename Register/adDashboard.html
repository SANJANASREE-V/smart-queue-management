<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background: linear-gradient(135deg,#FF9933 0%,#FFFFFF 50%,#138808 100%);
font-family: Arial;
}

.dashboard{
max-width:420px;
margin:40px auto;
padding:25px;
background:white;
border-radius:18px;
box-shadow:0 14px 30px rgba(0,0,0,0.35);
}

h1{
color:blue;
}

.welcome{
color:#0051ff;
margin-bottom:20px;
}

.queue-box{
padding:18px;
border-radius:12px;
background:#f5f5f5;
}

.queue-value{
font-size:2rem;
text-align:center;
margin:10px 0;
}

.controls{
display:flex;
gap:10px;
}

.controls button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:1.3rem;
cursor:pointer;
background:#e9e9e9;
}

.analytics-box{

margin-top:20px;
padding:15px;
background:#f0f0f0;
border-radius:10px;

}

.alert-box{

margin-top:20px;
padding:15px;
background:#fff3cd;
border-radius:10px;

}
canvas{

margin-top:15px;
background:white;
border-radius:10px;

}

</style>

</head>

<body>

<div class="dashboard">

<h1>Polling Booth Queue Control</h1>
<p class="welcome">Welcome, Admin</p>
<button onclick="logout()" style="float:right; padding:8px 16px; background:red; color:white; border:none; border-radius:8px; cursor:pointer;">Logout</button>

<div class="queue-box">

<h3>Station Number: <span id="stationNumber">—</span></h3>

<label>Select Booth</label>
<select id="boothSelector" onchange="switchBooth()"
    style="width:100%; padding:10px; border-radius:8px;
    border:1px solid #ddd; font-size:1rem; margin-bottom:10px;">
    <option value="">Loading booths...</option>
</select>

<label>Current Queue Length</label>
<div class="queue-value" id="queueValue">0</div>

<div class="controls">
<button onclick="decreaseQueue()">−</button>
<button onclick="increaseQueue()">+</button>
</div>

</div>


<!-- OVERCROWDING ALERT -->

<div class="alert-box" id="crowdAlert">

<b>Status:</b> Monitoring crowd levels...

</div>


<!-- ANALYTICS PANEL -->

<div class="analytics-box">

<h3>📊 Booth Analytics</h3>

<p>Total Updates Today: <span id="updateCount">0</span></p>

<p>Peak Queue Today: <span id="peakQueue">0</span></p>

<p>Average Queue: <span id="avgQueue">0</span></p>

</div>

</div>
<div class="analytics-box">

<h3>📈 Live Queue Trend</h3>

<canvas id="queueChart"></canvas>

</div>


<script>


const API_BASE_URL = 'http://localhost:8080';

// ── Auth Check ────────────────────────────
const token = localStorage.getItem('token');
const userRole = localStorage.getItem('userRole');
const userFullName = localStorage.getItem('userFullName');

if (!token || userRole !== 'ADMIN') {
    window.location.href = 'admin.html';
}

// ── Show Welcome Message ──────────────────
document.querySelector('.welcome').innerText = `Welcome, ${userFullName || 'Admin'}`;

// ── Variables ─────────────────────────────
const stationNumber  = document.getElementById("stationNumber");
const queueValueEl   = document.getElementById("queueValue");
const alertBox       = document.getElementById("crowdAlert");

let queueLength = 0;
let currentBoothId = null;
let history = [];

// ── Load Booths from Backend ──────────────

async function loadBooths() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/booths`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        const data = await response.json();
        console.log('Booths response:', data);

        if (data.success && data.data && data.data.length > 0) {
            // Fill dropdown with all booths
            const selector = document.getElementById('boothSelector');
            selector.innerHTML = '';

            data.data.forEach(booth => {
                const option = document.createElement('option');
                option.value = booth.id;
                option.text  = `${booth.boothNumber} - ${booth.boothName}`;
                selector.appendChild(option);
            });

            // Load first booth by default
            loadBoothById(data.data[0].id, data.data[0]);

        } else {
            console.log('No booths found');
        }
    } catch (error) {
        console.error('Error loading booths:', error);
    }
}

// ── Load specific booth data ───────────────
function loadBoothById(boothId, booth) {
    currentBoothId = boothId;
    stationNumber.innerText = booth.boothNumber || booth.boothName;
    queueLength = booth.currentQueueLength || 0;
    queueValueEl.innerText = queueLength;

    document.getElementById("updateCount").innerText = booth.totalUpdates || 0;
    document.getElementById("peakQueue").innerText   = booth.peakQueueLevel || 0;
    document.getElementById("avgQueue").innerText    = Math.round(booth.averageQueueSize || 0);

    checkCrowd();
    updateChart();
    console.log('Booth loaded:', currentBoothId);
}

// ── Switch booth from dropdown ─────────────
async function switchBooth() {
    const selector  = document.getElementById('boothSelector');
    const boothId   = selector.value;

    if (!boothId) return;

    try {
        const response = await fetch(`${API_BASE_URL}/api/booths/${boothId}`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        const data = await response.json();

        if (data.success) {
            loadBoothById(boothId, data.data);
            queueLength = data.data.currentQueueLength || 0;
            queueValueEl.innerText = queueLength;
        }
    } catch (error) {
        console.error('Error switching booth:', error);
    }
}

// ── Update Queue in Backend ───────────────
async function updateQueueInBackend() {
    if (!currentBoothId) {
        alert('No booth loaded! Please wait...');
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/admin/queue/update`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                boothId: currentBoothId,
                queueLength: queueLength
            })
        });

        const data = await response.json();

        if (data.success) {
            // Update analytics from response
            document.getElementById("updateCount").innerText = data.data.totalUpdates || 0;
            document.getElementById("peakQueue").innerText   = data.data.peakQueueLevel || 0;
            document.getElementById("avgQueue").innerText    = Math.round(data.data.averageQueueSize || 0);
        }
    } catch (error) {
        console.error('Error updating queue:', error);
    }
}



// ── Queue Controls ────────────────────────
function increaseQueue() {
    if (!currentBoothId) {
        loadBooths().then(() => {
            queueLength++;
            saveQueue();
        });
        return;
    }
    queueLength++;
    saveQueue();
}

function decreaseQueue() {
    if (!currentBoothId) {
        loadBooths().then(() => {
            if (queueLength > 0) {
                queueLength--;
                saveQueue();
            }
        });
        return;
    }
    if (queueLength > 0) {
        queueLength--;
        saveQueue();
    }
}

function saveQueue() {
    queueValueEl.innerText = queueLength;
    localStorage.setItem("queueLength", queueLength);
    updateAnalytics();
    checkCrowd();
    updateChart();
    updateQueueInBackend(); // ← sends to backend
}

// ── Crowd Check ───────────────────────────
function checkCrowd() {
    if (queueLength < 15) {
        alertBox.innerText = "🟢 Low crowd at this booth";
        alertBox.style.background = "#e7f3e8";
    } else if (queueLength < 30) {
        alertBox.innerText = "🟡 Moderate crowd";
        alertBox.style.background = "#fff9e6";
    } else {
        alertBox.innerText = "🔴 Overcrowding detected!";
        alertBox.style.background = "#f8d7da";
    }
}

// ── Analytics ─────────────────────────────
function updateAnalytics() {
    history.push(queueLength);
    document.getElementById("updateCount").innerText = history.length;
    let peak = Math.max(...history);
    document.getElementById("peakQueue").innerText = peak;
    let avg = Math.round(history.reduce((a, b) => a + b, 0) / history.length);
    document.getElementById("avgQueue").innerText = avg;
}

// ── Chart ─────────────────────────────────
let chartLabels = [];
let chartData   = [];

const ctx = document.getElementById('queueChart').getContext('2d');
const queueChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: chartLabels,
        datasets: [{
            label: 'Queue Length',
            data: chartData,
            borderColor: '#138808',
            backgroundColor: 'rgba(19,136,8,0.2)',
            borderWidth: 3,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
    }
});

function updateChart() {
    let time = new Date().toLocaleTimeString();
    chartLabels.push(time);
    chartData.push(queueLength);
    if (chartLabels.length > 10) {
        chartLabels.shift();
        chartData.shift();
    }
    queueChart.update();
}

// ── Logout ────────────────────────────────
function logout() {
    localStorage.clear();
    window.location.href = 'admin.html';
}

// ── Auto refresh every 30 seconds ─────────
setInterval(loadBooths, 30000);

// ── Load on page start ────────────────────
loadBooths();


</script>

</body>

</html>
