spring.application.name=queue-management
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/queue_management
spring.data.mongodb.database=queue_management

# JWT
app.jwt.secret=ThisIsAVerySecretKeyForJWTTokenGenerationAndItMustBeLongEnough256Bits
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500

# Logging
logging.level.com.polling=DEBUG
logging.level.org.springframework.security=DEBUG